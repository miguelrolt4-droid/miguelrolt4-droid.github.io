<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice · Miguel AMOUSSOU</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .author {
    color: #475569;
    font-size: .8rem;
    margin-bottom: 1.5rem;
    letter-spacing: .05em;
  }
  .author span { color: #2563eb; font-weight: 600; }

  .calc {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 24px;
    padding: 1.5rem;
    width: 320px;
    box-shadow: 0 25px 60px rgba(0,0,0,.5);
  }

  .screen {
    background: #0f172a;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    text-align: right;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  .screen .expr {
    font-size: .85rem;
    color: #475569;
    min-height: 20px;
    margin-bottom: .3rem;
    word-break: break-all;
  }
  .screen .result {
    font-size: 2.4rem;
    font-weight: 700;
    color: #f1f5f9;
    word-break: break-all;
    line-height: 1.1;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    height: 64px;
    cursor: pointer;
    transition: all .12s;
    font-family: inherit;
  }
  button:active { transform: scale(.93); }

  .btn-num {
    background: #273549;
    color: #e2e8f0;
  }
  .btn-num:hover { background: #334155; }

  .btn-op {
    background: #1e3a5f;
    color: #60a5fa;
  }
  .btn-op:hover { background: #1e4080; }

  .btn-eq {
    background: #2563eb;
    color: #fff;
    grid-column: span 2;
  }
  .btn-eq:hover { background: #1d4ed8; }

  .btn-clear {
    background: #7f1d1d;
    color: #fca5a5;
  }
  .btn-clear:hover { background: #991b1b; }

  .btn-del {
    background: #1e293b;
    color: #94a3b8;
    border: 1px solid #334155;
  }
  .btn-del:hover { background: #334155; }

  .btn-zero { grid-column: span 2; }
</style>
</head>
<body>

<p class="author">Projet par <span>Miguel AMOUSSOU</span> · Développeur Web</p>

<div class="calc">
  <div class="screen">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="grid">
    <button class="btn-clear" onclick="clearAll()">C</button>
    <button class="btn-del" onclick="deleteLast()">⌫</button>
    <button class="btn-op" onclick="addOp('%')">%</button>
    <button class="btn-op" onclick="addOp('÷')">÷</button>

    <button class="btn-num" onclick="addNum('7')">7</button>
    <button class="btn-num" onclick="addNum('8')">8</button>
    <button class="btn-num" onclick="addNum('9')">9</button>
    <button class="btn-op" onclick="addOp('×')">×</button>

    <button class="btn-num" onclick="addNum('4')">4</button>
    <button class="btn-num" onclick="addNum('5')">5</button>
    <button class="btn-num" onclick="addNum('6')">6</button>
    <button class="btn-op" onclick="addOp('-')">−</button>

    <button class="btn-num" onclick="addNum('1')">1</button>
    <button class="btn-num" onclick="addNum('2')">2</button>
    <button class="btn-num" onclick="addNum('3')">3</button>
    <button class="btn-op" onclick="addOp('+')">+</button>

    <button class="btn-num btn-zero" onclick="addNum('0')">0</button>
    <button class="btn-num" onclick="addDecimal()">.</button>
    <button class="btn-eq" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let expression = '';
  let justCalculated = false;

  const exprEl = document.getElementById('expr');
  const resultEl = document.getElementById('result');

  function updateDisplay() {
    exprEl.textContent = expression;
    resultEl.textContent = expression === '' ? '0' : getPreview();
  }

  function getPreview() {
    try {
      const raw = expression
        .replace(/÷/g, '/')
        .replace(/×/g, '*')
        .replace(/%/g, '/100');
      const val = Function('"use strict"; return (' + raw + ')')();
      if (isNaN(val) || !isFinite(val)) return expression;
      return parseFloat(val.toFixed(10)).toString();
    } catch {
      return expression;
    }
  }

  function addNum(n) {
    if (justCalculated) { expression = ''; justCalculated = false; }
    expression += n;
    updateDisplay();
  }

  function addOp(op) {
    justCalculated = false;
    const last = expression.slice(-1);
    if (['+', '-', '×', '÷', '%'].includes(last)) {
      expression = expression.slice(0, -1);
    }
    expression += op;
    updateDisplay();
  }

  function addDecimal() {
    const parts = expression.split(/[+\-×÷]/);
    const current = parts[parts.length - 1];
    if (current.includes('.')) return;
    if (current === '') expression += '0';
    expression += '.';
    updateDisplay();
  }

  function deleteLast() {
    expression = expression.slice(0, -1);
    justCalculated = false;
    updateDisplay();
  }

  function clearAll() {
    expression = '';
    justCalculated = false;
    resultEl.textContent = '0';
    exprEl.textContent = '';
  }

  function calculate() {
    if (!expression) return;
    try {
      const raw = expression
        .replace(/÷/g, '/')
        .replace(/×/g, '*')
        .replace(/%/g, '/100');
      const val = Function('"use strict"; return (' + raw + ')')();
      if (isNaN(val) || !isFinite(val)) {
        resultEl.textContent = 'Erreur';
        exprEl.textContent = expression;
        expression = '';
        return;
      }
      const result = parseFloat(val.toFixed(10)).toString();
      exprEl.textContent = expression + ' =';
      resultEl.textContent = result;
      expression = result;
      justCalculated = true;
    } catch {
      resultEl.textContent = 'Erreur';
      expression = '';
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') addNum(e.key);
    else if (e.key === '+') addOp('+');
    else if (e.key === '-') addOp('-');
    else if (e.key === '*') addOp('×');
    else if (e.key === '/') { e.preventDefault(); addOp('÷'); }
    else if (e.key === '%') addOp('%');
    else if (e.key === '.') addDecimal();
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === 'Escape') clearAll();
  });
</script>

</body>
</html>
